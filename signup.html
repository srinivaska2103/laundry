<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='15' y='10' width='70' height='80' rx='12' stroke='%232563EB' stroke-width='8'/%3E%3Cline x1='25' y1='26' x2='75' y2='26' stroke='%232563EB' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='35' cy='20' r='4' fill='%232563EB'/%3E%3Ccircle cx='47' cy='20' r='2' fill='%232563EB'/%3E%3Ccircle cx='55' cy='20' r='2' fill='%232563EB'/%3E%3Ccircle cx='50' cy='60' r='24' stroke='%232563EB' stroke-width='6'/%3E%3Cpath d='M50 48C50 48 58 56.5 58 61.5C58 65.9183 54.4183 69.5 50 69.5C45.5817 69.5 42 65.9183 42 61.5C42 56.5 50 48 50 48Z' fill='%232563EB'/%3E%3C/svg%3E">
  <title>Sign Up - FreshFold Laundry</title>
  <meta name="description" content="Create a FreshFold account to schedule automatic pickups and track wash sheets.">
  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            secondary: '#38BDF8',
            accent: '#0EA5E9',
            success: '#22C55E',
            text: '#1E293B',
            darkBg: '#0F172A',
            lightBg: '#F8FAFC',
            grayCustom: '#64748B'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-[#F8FAFC] dark:bg-[#0F172A] text-[#1E293B] dark:text-slate-200 transition-colors duration-300 min-h-screen flex flex-col justify-between">

  <!-- Header containing Logo and theme/dir controls -->
  <header class="w-full py-5 px-4 sm:px-6 lg:px-8 absolute top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <!-- Logo -->
      <a href="index.html" class="flex items-center group">
        <svg class="h-9 w-9 mr-2 transition-transform duration-300 group-hover:rotate-12" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="nav-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#2563EB" />
              <stop offset="100%" stop-color="#38BDF8" />
            </linearGradient>
          </defs>
          <rect x="15" y="10" width="70" height="80" rx="12" stroke="url(#nav-logo-grad)" stroke-width="8" fill="none"/>
          <line x1="25" y1="26" x2="75" y2="26" stroke="url(#nav-logo-grad)" stroke-width="4" stroke-linecap="round"/>
          <circle cx="50" cy="60" r="24" stroke="url(#nav-logo-grad)" stroke-width="6" fill="none"/>
          <path d="M50 48C50 48 58 56.5 58 61.5C58 65.9183 54.4183 69.5 50 69.5C45.5817 69.5 42 65.9183 42 61.5C42 56.5 50 48 50 48Z" fill="url(#nav-logo-grad)"/>
        </svg>
        <span class="font-display font-semibold text-xl tracking-tight text-slate-800 dark:text-white group-hover:text-primary transition-colors">FreshFold</span>
      </a>

      <!-- Right Side Controls -->
      <div class="flex items-center space-x-3">
        <!-- LTR/RTL Toggle -->
        <button class="dir-toggle-btn p-2 rounded-lg text-gray-500 hover:text-primary dark:text-gray-400 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-slate-800 transition-all duration-200" aria-label="Toggle language direction">
          <span class="dir-label text-xs font-bold uppercase">RTL</span>
        </button>

        <!-- Light/Dark Toggle -->
        <button class="theme-toggle-btn p-2 rounded-lg text-gray-500 hover:text-primary dark:text-gray-400 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-slate-800 transition-all duration-200" aria-label="Toggle theme">
          <!-- Moon Icon (Light Mode Active) -->
          <svg class="theme-moon-icon h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          <!-- Sun Icon (Dark Mode Active) -->
          <svg class="theme-sun-icon h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m2.828 0l-.707-.707m12.728-12.728l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Signup Section -->
  <main class="flex-1 flex items-center justify-center pt-32 pb-16 px-4 relative overflow-hidden bg-mesh">
    <!-- Animated background bubbles -->
    <div class="absolute top-20 left-4 w-72 h-72 bg-blue-400/10 dark:bg-blue-600/5 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-10 right-4 w-96 h-96 bg-sky-400/10 dark:bg-sky-600/5 rounded-full blur-3xl animate-pulse delay-700"></div>

    <!-- Signup Card -->
    <div class="w-full max-w-md bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-white/20 dark:border-slate-800/85 p-8 rounded-3xl shadow-2xl relative z-10 hover-lift">
      <div class="text-center mb-8">
        <h2 class="font-display font-semibold text-3xl text-slate-800 dark:text-white">Create Account</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Sign up to modern eco-friendly fabric restoration</p>
      </div>

      <!-- Third Party Auth -->
      <div class="grid grid-cols-3 gap-3 mb-6">
        <!-- Google -->
        <button onclick="handleThirdPartyLogin('Google')" class="flex items-center justify-center py-2.5 border border-gray-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-gray-50 dark:hover:bg-slate-750 transition duration-200 shadow-sm" aria-label="Sign up with Google">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
          </svg>
        </button>

        <!-- Facebook -->
        <button onclick="handleThirdPartyLogin('Facebook')" class="flex items-center justify-center py-2.5 border border-gray-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-gray-50 dark:hover:bg-slate-750 transition duration-200 shadow-sm" aria-label="Sign up with Facebook">
          <svg class="h-5 w-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </button>

        <!-- Apple -->
        <button onclick="handleThirdPartyLogin('Apple')" class="flex items-center justify-center py-2.5 border border-gray-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-gray-50 dark:hover:bg-slate-750 transition duration-200 shadow-sm" aria-label="Sign up with Apple">
          <svg class="h-5 w-5 text-slate-800 dark:text-white" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.49-.62.71-1.16 1.85-1.01 2.96 1.1.09 2.23-.58 2.94-1.39z"/>
          </svg>
        </button>
      </div>

      <!-- Divider -->
      <div class="flex items-center mb-6">
        <div class="flex-grow h-px bg-gray-200 dark:bg-slate-700"></div>
        <span class="px-3 text-xs font-semibold text-slate-400 uppercase">Or register with</span>
        <div class="flex-grow h-px bg-gray-200 dark:bg-slate-700"></div>
      </div>

      <!-- Signup Form -->
      <form id="signup-form" class="space-y-4" onsubmit="handleSignupSubmit(event)">
        <!-- Name -->
        <div>
          <label for="name" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Full Name</label>
          <input type="text" id="name" required placeholder="Alex Johnson" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 text-slate-800 dark:text-slate-100 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition duration-200">
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
          <input type="email" id="email" required placeholder="alex@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 text-slate-800 dark:text-slate-100 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition duration-200">
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Password</label>
          <div class="relative">
            <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 text-slate-800 dark:text-slate-100 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition duration-200">
            <!-- Toggle eye button -->
            <button type="button" onclick="togglePasswordVisibility('password', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary dark:hover:text-white" aria-label="Toggle password visibility">
              <!-- Eye Icon (Closed eye) -->
              <svg class="eye-off-icon h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
              <!-- Eye Icon (Open eye - hidden by default) -->
              <svg class="eye-on-icon h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div>
          <label for="confirm-password" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Confirm Password</label>
          <div class="relative">
            <input type="password" id="confirm-password" required placeholder="••••••••" class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 text-slate-800 dark:text-slate-100 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition duration-200">
            <!-- Toggle eye button -->
            <button type="button" onclick="togglePasswordVisibility('confirm-password', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary dark:hover:text-white" aria-label="Toggle password visibility">
              <!-- Eye Icon (Closed eye) -->
              <svg class="eye-off-icon h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
              <!-- Eye Icon (Open eye - hidden by default) -->
              <svg class="eye-on-icon h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Agreement -->
        <div class="flex items-start">
          <input type="checkbox" id="terms" required class="h-4 w-4 rounded border-gray-300 dark:border-slate-700 text-primary focus:ring-primary accent-primary mt-0.5 cursor-pointer">
          <label for="terms" class="ml-2.5 text-xs text-slate-500 dark:text-slate-400 cursor-pointer leading-relaxed">I agree to the <a href="coming-soon.html" class="font-bold text-primary hover:underline">Terms of Service</a> and <a href="coming-soon.html" class="font-bold text-primary hover:underline">Privacy Policy</a></label>
        </div>

        <div id="error-message" class="hidden text-xs font-semibold text-red-500 text-center"></div>

        <!-- Submit Button -->
        <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-primary to-secondary text-white font-semibold rounded-xl shadow-lg shadow-blue-500/20 hover:shadow-xl hover:shadow-blue-500/35 hover:-translate-y-0.5 transition duration-200 text-sm mt-6">
          Create Account
        </button>
      </form>

      <!-- Feedback / Success Simulation modal/toast -->
      <div id="loader-toast" class="hidden absolute inset-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-sm rounded-3xl z-30 flex flex-col items-center justify-center space-y-4">
        <svg class="animate-spin h-10 w-10 text-primary" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="text-sm font-semibold dark:text-white" id="loader-text">Creating account...</span>
      </div>

      <!-- Links to Login -->
      <div class="text-center mt-6">
        <p class="text-xs text-slate-500 dark:text-slate-400">Already have an account? <a href="login.html" class="font-bold text-primary hover:underline">Sign in</a></p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 text-center text-xs">
    <p>&copy; 2026 FreshFold Laundry Inc. All rights reserved.</p>
  </footer>

  <script src="assets/js/main.js"></script>
  <script>
    // Local script for custom signup behavior
    function togglePasswordVisibility(fieldId, button) {
      const input = document.getElementById(fieldId);
      const eyeOff = button.querySelector('.eye-off-icon');
      const eyeOn = button.querySelector('.eye-on-icon');
      
      if (input.type === 'password') {
        input.type = 'text';
        eyeOff.classList.add('hidden');
        eyeOn.classList.remove('hidden');
      } else {
        input.type = 'password';
        eyeOff.classList.remove('hidden');
        eyeOn.classList.add('hidden');
      }
    }

    function handleThirdPartyLogin(provider) {
      const toast = document.getElementById('loader-toast');
      const loaderText = document.getElementById('loader-text');
      loaderText.innerText = `Connecting to ${provider}...`;
      toast.classList.remove('hidden');
      
      setTimeout(() => {
        loaderText.innerText = `Authorizing user...`;
        setTimeout(() => {
          window.location.href = 'portal.html';
        }, 1200);
      }, 1000);
    }

    function handleSignupSubmit(event) {
      event.preventDefault();
      
      const pwd = document.getElementById('password').value;
      const confirmPwd = document.getElementById('confirm-password').value;
      const errorMsg = document.getElementById('error-message');

      if (pwd !== confirmPwd) {
        errorMsg.innerText = "Passwords do not match.";
        errorMsg.classList.remove('hidden');
        return;
      }
      errorMsg.classList.add('hidden');

      const toast = document.getElementById('loader-toast');
      const loaderText = document.getElementById('loader-text');
      loaderText.innerText = `Creating account...`;
      toast.classList.remove('hidden');

      setTimeout(() => {
        loaderText.innerText = `Registration successful! Redirecting...`;
        setTimeout(() => {
          window.location.href = 'portal.html';
        }, 1000);
      }, 1500);
    }
  </script>
</body>
</html>
